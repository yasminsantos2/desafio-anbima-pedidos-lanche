<div class="page-container">
  <div class="header">
    <h1>Novo Pedido</h1>
    <p>Cole a string posicional de 40 caracteres para processar seu pedido.</p>
  </div>

  <div class="card glass">
    <div class="form-group">
      <label for="posicional">String Posicional (40 carac.)</label>
      <textarea 
        id="posicional" 
        [(ngModel)]="payload" 
        placeholder="Ex: HAMBURGUER CARNE     SALADA    02SUCO    "
        rows="3"
        [class.invalid]="payload().length > 0 && payload().length !== 40"
      ></textarea>
      <div class="counter" [class.valid]="payload().length === 40">
        {{ payload().length }} / 40 caracteres
      </div>
    </div>

    <button 
      class="btn-send" 
      [disabled]="loading() || payload().length !== 40"
      (click)="enviar()"
    >
      <span *ngIf="!loading()">Enviar Pedido</span>
      <span *ngIf="loading()" class="loader"></span>
    </button>
  </div>

  <div *ngIf="error()" class="message error">
    <div class="error-icon">
      <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor"><path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>
    </div>
    <div class="error-content">
      <strong>Erros de Validação:</strong>
      <p>{{ error() }}</p>
    </div>
  </div>

  <div *ngIf="result()" class="message success glass">
    <div class="success-header">
      <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor"><path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z"/></svg>
      <span>Pedido processado com sucesso!</span>
    </div>
    <pre>{{ result() | json }}</pre>
  </div>
</div>
